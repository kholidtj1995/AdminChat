<!DOCTYPE html>
<html lang="tg" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <!-- Мета-тегҳои муҳим барои 100% ровно истодан дар ҳама намуди телефонҳо -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }

        /* Контейнери мобилӣ: дар телефон 100% экранро мегирад, дар компютер маҳдуд мешавад */
        .phone-container { 
            width: 100%; 
            max-width: 480px; 
            height: 100vh; 
            height: 100dvh; 
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            overflow: hidden;
            /* Барои экранҳои iPhone (челкадор) */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Қисми болоии чат (Шапка) */
        .chat-header {
            background: #007bff;
            color: white;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .back-btn { 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .back-btn:active { background: rgba(255, 255, 255, 0.3); }

        .header-title {
            font-size: 16px;
            font-weight: 700;
        }

        /* Қисми намоиши паёмҳо */
        #chatDisplay { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            background-color: #f4f6f9;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        #chatDisplay::-webkit-scrollbar { display: none; }

        /* Паёмакҳо */
        .msg { 
            padding: 10px 14px; 
            border-radius: 16px; 
            max-width: 75%; 
            font-size: 15px;
            line-height: 20px;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .msg-user { 
            align-self: flex-end; 
            background-color: #007bff; 
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-admin { 
            align-self: flex-start; 
            background-color: white; 
            color: #333;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }
        .msg strong {
            font-size: 12px;
            display: block;
            margin-bottom: 2px;
            opacity: 0.8;
        }

        /* Формаи воридшавӣ */
        .auth-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            background: #ffffff;
        }
        .auth-zone h2 {
            margin-bottom: 20px;
            color: #1e293b;
            text-align: center;
        }

        /* Қисми воридкунии паём аз поён */
        .input-area {
            padding: 12px;
            background: white;
            display: flex;
            gap: 8px;
            border-top: 1px solid #edf2f7;
            align-items: center;
            flex-shrink: 0;
        }

        input { 
            flex: 1;
            padding: 12px 16px; 
            border: 1px solid #e2e8f0; 
            border-radius: 20px; 
            font-size: 15px; 
            background: #f8fafc;
            outline: none;
        }
        input:focus { border-color: #007bff; background: #fff; }

        button { 
            padding: 12px 24px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            font-size: 15px;
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:active { background: #0056b3; }
        
        #joinBtn {
            border-radius: 12px;
            margin-top: 10px;
        }
        #username {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Шапкаи болоӣ -->
    <div class="chat-header">
        <a href="https://kholidtj1995.github.io/live-chat/" class="back-btn">← Бозгашт</a>
        <div class="header-title" id="headerTitle">Воридшавӣ</div>
    </div>
    
    <!-- Равзанаи Воридшавӣ -->
    <div id="authBox" class="auth-zone">
        <h2>Хуш омадед!</h2>
        <input type="text" id="username" placeholder="Номи шумо...">
        <button onclick="joinChat()" id="joinBtn">Ворид шудан</button>
    </div>

    <!-- Равзанаи Чат (Аввал пинҳон аст) -->
    <div id="chatBox" style="display:none; flex-direction: column; flex: 1; overflow: hidden;">
        <div id="chatDisplay"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="Паёмак...">
            <button onclick="sendMessage()">Ирсол</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDskehF5n_IJuuUsGWQEFBmjM80uCSDEyM",
        authDomain: "live-chat-ea070.firebaseapp.com",
        databaseURL: "https://live-chat-ea070-default-rtdb.firebaseio.com",
        projectId: "live-chat-ea070",
        storageBucket: "live-chat-ea070.firebasestorage.app",
        messagingSenderId: "321161064947",
        appId: "1:321161064947:web:53603c0e1be0b3baf66286"
    };

    const db = getDatabase(initializeApp(firebaseConfig));

    window.joinChat = () => {
        const user = document.getElementById('username').value.trim();
        if(user === "") {
            alert("Лутфан номи худро нависед!");
            return;
        }
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('chatBox').style.display = 'flex';
        document.getElementById('headerTitle').innerText = "Чат бо Админ";
        
        // Фокус ба паёмак
        setTimeout(() => document.getElementById('message').focus(), 100);
    };

    window.sendMessage = () => {
        const user = document.getElementById('username').value;
        const text = document.getElementById('message').value;
        if(text.trim() === "") return; 
        push(ref(db, 'chats/'), { user, text });
        document.getElementById('message').value = '';
    };

    // Пайваст кардани тугмаи Enter барои ирсоли паём
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('authBox').style.display !== 'none') {
                joinChat();
            } else {
                sendMessage();
            }
        }
    });

    onValue(ref(db, 'chats/'), (snapshot) => {
        const data = snapshot.val();
        const display = document.getElementById('chatDisplay');
        display.innerHTML = '';
        for (let key in data) {
            const chat = data[key];
            const isUser = chat.user !== "Админ";
            display.innerHTML += `<div class="msg ${isUser ? 'msg-user' : 'msg-admin'}"><strong>${chat.user}</strong>${chat.text}</div>`;
        }
        display.scrollTop = display.scrollHeight; 
    });
</script>
</body>
</html>
