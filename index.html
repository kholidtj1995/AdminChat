<!DOCTYPE html>
<html lang="tg" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
        }

        .phone-container { 
            width: 100%; 
            max-width: 480px; 
            height: 100vh; 
            height: 100dvh; 
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .chat-header {
            background: #007bff;
            color: white;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Барои озод ҷойгир шудани иконка */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn { 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            border: none; 
            padding: 8px 14px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .back-btn:active { background: rgba(255, 255, 255, 0.3); }

        .header-title-container {
            display: flex;
            flex-direction: column;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
        }

        /* МАТНИ СТАТУСИ АДМИН ДАР ШАПКА */
        .admin-subtitle {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 1px;
            font-weight: 500;
        }

        /* ИКОНКАИ ДУРАХШОНИ ОНЛАЙН */
        .admin-status-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444; /* Сурх - офлайн */
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
        }
        .admin-status-dot.online {
            background-color: #10b981; /* Сабз - онлайн */
            box-shadow: 0 0 8px 2px rgba(16, 185, 129, 0.6);
            animation: pulseGlow 1.5s infinite;
        }
        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        #chatDisplay { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            background-color: #f4f6f9;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        #chatDisplay::-webkit-scrollbar { display: none; }

        .msg { 
            padding: 10px 14px; 
            border-radius: 16px; 
            max-width: 75%; 
            font-size: 15px;
            line-height: 20px;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .msg-user { 
            align-self: flex-end; 
            background-color: #007bff; 
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-admin { 
            align-self: flex-start; 
            background-color: white; 
            color: #333;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }
        .msg strong {
            font-size: 12px;
            display: block;
            margin-bottom: 2px;
            opacity: 0.8;
        }

        .auth-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: #f8fafc;
        }
        
        .auth-card {
            width: 100%;
            background: white;
            padding: 30px 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.01);
            text-align: center;
            border: 1px solid rgba(0, 123, 255, 0.05);
        }

        .auth-zone h2 {
            margin-bottom: 8px;
            color: #1e293b;
            font-size: 22px;
            font-weight: 700;
        }

        .auth-zone p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .input-area {
            padding: 12px;
            background: white;
            display: flex;
            gap: 8px;
            border-top: 1px solid #edf2f7;
            align-items: center;
            flex-shrink: 0;
        }

        input { 
            width: 100%;
            padding: 14px 16px; 
            border: 1px solid #e2e8f0; 
            border-radius: 14px; 
            font-size: 15px; 
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: #007bff; background: #fff; box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1); }

        button { 
            width: 100%;
            padding: 14px 24px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 15px;
            font-weight: 600;
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:active { background: #0056b3; }
        
        #joinBtn {
            margin-top: 16px;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2);
        }
        #username {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Шапкаи болоӣ -->
    <div class="chat-header">
        <div class="chat-header-left">
            <a href="https://kholidtj1995.github.io/live-chat/" class="back-btn">← Бозгашт</a>
            <div class="header-title-container">
                <div class="header-title" id="headerTitle">Воридшавӣ</div>
                <div class="admin-subtitle" id="adminSubtitle" style="display: none;">Админ ҳоло пайваст нест</div>
            </div>
        </div>
        <!-- ИКОНКАИ ОНЛАЙН СТАТУСИ АДМИН -->
        <div id="adminStatusDot" class="admin-status-dot" style="display: none;"></div>
    </div>
    
    <!-- Равзанаи Воридшавии Зебо -->
    <div id="authBox" class="auth-zone">
        <div class="auth-card">
            <h2>Хуш омадед!</h2>
            <p>Лутфан номи худро нависед</p>
            <input type="text" id="username" placeholder="Номи шумо...">
            <button onclick="joinChat()" id="joinBtn">Ворид шудан</button>
        </div>
    </div>

    <!-- Равзанаи Чат -->
    <div id="chatBox" style="display:none; flex-direction: column; flex: 1; overflow: hidden;">
        <div id="chatDisplay"></div>
        <div class="input-area">
            <input type="text" id="message" placeholder="Паёмак...">
            <button onclick="sendMessage()" style="width: auto;">Ирсол</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDskehF5n_IJuuUsGWQEFBmjM80uCSDEyM",
        authDomain: "live-chat-ea070.firebaseapp.com",
        databaseURL: "https://live-chat-ea070-default-rtdb.firebaseio.com",
        projectId: "live-chat-ea070",
        storageBucket: "live-chat-ea070.firebasestorage.app",
        messagingSenderId: "321161064947",
        appId: "1:321161064947:web:53603c0e1be0b3baf66286"
    };

    const db = getDatabase(initializeApp(firebaseConfig));

    window.joinChat = () => {
        const user = document.getElementById('username').value.trim();
        if(user === "") {
            alert("Лутфан номи худро нависед!");
            return;
        }
        document.getElementById('authBox').style.display = 'none';
        document.getElementById('chatBox').style.display = 'flex';
        document.getElementById('headerTitle').innerText = "Чат бо Админ";
        
        // Нишон додани субтитр ва иконкаи статус пас аз ворид шудан ба чат
        document.getElementById('adminSubtitle').style.display = 'block';
        document.getElementById('adminStatusDot').style.display = 'block';
        
        // Гӯш кардани статуси Админ дар вақти воқеӣ
        listenAdminStatus();

        setTimeout(() => document.getElementById('message').focus(), 100);
    };

    window.sendMessage = () => {
        const user = document.getElementById('username').value;
        const text = document.getElementById('message').value;
        if(text.trim() === "") return; 
        push(ref(db, 'chats/'), { user, text });
        document.getElementById('message').value = '';
    };

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('authBox').style.display !== 'none') {
                joinChat();
            } else {
                sendMessage();
            }
        }
    });

    // ФУНКСИЯИ НАЗОРАТИ СТАТУСИ АДМИН
    function listenAdminStatus() {
        onValue(ref(db, 'admin_status/'), (snapshot) => {
            const status = snapshot.val();
            const subtitle = document.getElementById('adminSubtitle');
            const dot = document.getElementById('adminStatusDot');

            if (status === "online") {
                subtitle.innerText = "Админ дар чат пайваст шуд";
                subtitle.style.color = "#10b981"; /* Ранги матни сабз */
                dot.classList.add('online');
            } else {
                subtitle.innerText = "Админ ҳоло пайваст нест";
                subtitle.style.color = "rgba(255, 255, 255, 0.9)"; /* Ранги сафеди хира */
                dot.classList.remove('online');
            }
        });
    }

    onValue(ref(db, 'chats/'), (snapshot) => {
        const data = snapshot.val();
        const display = document.getElementById('chatDisplay');
        display.innerHTML = '';
        for (let key in data) {
            const chat = data[key];
            const isUser = chat.user !== "Админ";
            display.innerHTML += `<div class="msg ${isUser ? 'msg-user' : 'msg-admin'}"><strong>${chat.user}</strong>${chat.text}</div>`;
        }
        display.scrollTop = display.scrollHeight; 
    });
</script>
</body>
</html>
