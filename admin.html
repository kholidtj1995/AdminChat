<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 10px; margin: 0; }
        .admin-container { max-width: 500px; margin: auto; padding-top: 20px; }
        #chatDisplay { display: flex; flex-direction: column; margin-bottom: 20px; border: 1px solid #ddd; height: 60vh; overflow-y: auto; background: white; padding: 10px; border-radius: 8px; }
        .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 75%; font-size: 15px; line-height: 20px; word-break: break-word; }
        .msg-user { align-self: flex-start; background-color: #fff; border: 1px solid #ddd; }
        .msg-admin { align-self: flex-end; background-color: #dcf8c6; }
        .input-zone { display: flex; gap: 8px; }
        input { padding: 12px; flex: 1; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:active { background: #0056b3; }
    </style>
</head>
<body>
<div class="admin-container">
    <h3>Админ Панел</h3>
    <div id="chatDisplay"></div>
    <div class="input-zone">
        <input type="text" id="adminMsg" placeholder="Ҷавоб ба корбар...">
        <button id="sendBtn">Ҷавоб додан</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDskehF5n_IJuuUsGWQEFBmjM80uCSDEyM",
        authDomain: "live-chat-ea070.firebaseapp.com",
        databaseURL: "https://live-chat-ea070-default-rtdb.firebaseio.com",
        projectId: "live-chat-ea070",
        storageBucket: "live-chat-ea070.firebasestorage.app",
        messagingSenderId: "321161064947",
        appId: "1:321161064947:web:53603c0e1be0b3baf66286"
    };

    const db = getDatabase(initializeApp(firebaseConfig));

    // 🟢 ИДОРАКУНИИ СТАТУСИ АДМИН (ОНЛАЙН / ОФЛАЙН)
    const adminStatusRef = ref(db, 'admin_status/');
    set(adminStatusRef, "online");
    onDisconnect(adminStatusRef).set("offline");

    // Функсияи фиристодани паём
    const sendAdmin = () => {
        const inputEl = document.getElementById('adminMsg');
        const text = inputEl.value;
        if(text.trim() === "") return;
        push(ref(db, 'chats/'), { user: "Админ", text: text });
        inputEl.value = '';
    };

    // Пайваст кардани тугмаи клик ба таври бехатар
    document.getElementById('sendBtn').addEventListener('click', sendAdmin);

    // Пайваст кардани тугмаи Enter барои ирсоли ҷавоб
    document.getElementById('adminMsg').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            sendAdmin();
        }
    });

    onValue(ref(db, 'chats/'), (snapshot) => {
        const data = snapshot.val();
        const display = document.getElementById('chatDisplay');
        display.innerHTML = '';
        for (let key in data) {
            const chat = data[key];
            const isAdmin = chat.user === "Админ";
            display.innerHTML += `<div class="msg ${isAdmin ? 'msg-admin' : 'msg-user'}"><strong>${chat.user}</strong><br>${chat.text}</div>`;
        }
        display.scrollTop = display.scrollHeight;
    });
</script>
</body>
</html>
